services:
  postgres:
    image: postgres:16
    container_name: neocarta-postgres
    environment:
      POSTGRES_DB: nvidia
      POSTGRES_USER: neocarta
      POSTGRES_PASSWORD: neocarta
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neocarta -d nvidia"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: neocarta-neo4j
    environment:
      NEO4J_AUTH: neo4j/neocarta123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7
    container_name: neocarta-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  neo4jdata:
